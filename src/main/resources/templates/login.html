<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | Sun & Moon</title>
  <link rel="icon" type="image/png" th:href="@{/assets/images/ui/heart-64.png}" href="assets/images/ui/heart-64.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sunflower:wght@300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" href="assets/css/style.css">
</head>
<body class="login-page">
  <div class="login-shell">
    <section class="login-panel">
      <p class="login-eyebrow">Private Archive</p>
      <h1 class="login-title">Sun & Moon<br>기억 보관함</h1>
      <p class="login-description">
        두 사람만 볼 수 있는 작은 아카이브입니다.
        로그인 후 대화 목록과 추억 기록을 이어서 확인할 수 있습니다.
      </p>
    </section>

    <section class="login-form-panel">
      <div class="login-form-header">
        <p class="login-caption">Access</p>
        <h2 class="login-form-title">로그인</h2>
      </div>

      <div th:if="${param.error}" class="login-message error">
        아이디 또는 비밀번호가 올바르지 않습니다.
      </div>
      <div th:if="${param.logout}" class="login-message success">
        안전하게 로그아웃되었습니다.
      </div>

      <form class="login-form" th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="login-field">
          <label for="loginId">아이디</label>
          <input
            id="loginId"
            class="login-input"
            type="text"
            name="loginId"
            autocomplete="username"
            placeholder="아이디를 입력하세요"
            required
            autofocus>
        </div>

        <div class="login-field">
          <label for="password">비밀번호</label>
          <input
            id="password"
            class="login-input"
            type="password"
            name="password"
            autocomplete="current-password"
            placeholder="비밀번호를 입력하세요"
            required>
        </div>

        <button class="login-submit" type="submit">로그인하기</button>
      </form>
    </section>
  </div>
</body>
</html>
