<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunMoon Memory API</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: "Segoe UI", sans-serif;
      background: #f7f4ef;
      color: #2f2a24;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      background: #fffdf9;
      border: 1px solid #e8dfd3;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 12px 36px rgba(63, 47, 29, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      line-height: 1.7;
    }

    ul {
      padding-left: 18px;
      line-height: 1.9;
    }

    code {
      background: #f1e9de;
      border-radius: 8px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
<main>
  <h1>SunMoon Memory API</h1>
  <p>대화 리마인드 웹의 Spring MVC 이전 작업용 API 서버입니다.</p>
  <ul>
    <li><code>GET /db/ping</code> : DB 연결 확인</li>
    <li><code>GET /api/conversations</code> : 대화 목록 조회</li>
    <li><code>GET /api/conversations/{id}</code> : 대화 상세 조회</li>
  </ul>
</main>
</body>
</html>
